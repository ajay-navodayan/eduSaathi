services:
  # 1. PostgreSQL Database
  - type: database
    name: edusaathi-db
    plan: free
    region: singapore

  # 2. Backend Web Service
  - type: web
    name: edusaathi-backend
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: edusaathi-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        fromService:
          type: web
          name: edusaathi-frontend
          envVarKey: RENDER_EXTERNAL_URL
      # Sensitive keys- user must add these in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # 3. Frontend Static Site
  - type: web
    name: edusaathi-frontend
    runtime: static
    plan: free
    region: singapore
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: edusaathi-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
